<!doctype html>

  <body>

        <div class="logo-wrapper" id="mainLogo">
          <div class="html-icon">H</div>
          <span class="logo-name">HTML</span>
        </div>

        <div class="category-menu">
          <button class="menu-btn active" data-category="all">Hammasi</button>
          <button class="menu-btn" data-category="Kirish">Kirish</button>
          <button class="menu-btn" data-category="Tag va Attribute">

          <button class="menu-btn" data-category="CSS kirish">

          <button class="menu-btn" data-category="Block va Inline">

        <a
          href="https://github.com/AbdullayevTemurmalik"
          target="_blank"
          class="github-link"
        >
          <i class="bx bxl-github"></i>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <div class="container">
      <h1>HTML darslari rejasini ko'zdan kechiring</h1>
      <p class="subtitle">Mavzular, reja va amaliy vazifalar jamlanmasi</p>

      <input

      <div id="results"></div>
    </div>

    <script type="module" src="main.js"></script>
